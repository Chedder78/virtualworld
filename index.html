<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GPK ULTRA 3D | Immersive Collector's Hub</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.0/dist/aframe-environment-component.min.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
    <script src="https://unpkg.com/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Bangers', cursive;
        }
        #enter-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            background: #ff3e41;
            color: #ffde37;
            border: 5px solid #1a1a1a;
            font-size: 2.5rem;
            cursor: pointer;
            z-index: 10000;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            font-family: 'Bangers', cursive;
            transition: transform 0.2s;
        }
        #enter-button:hover {
            transform: translate(-50%, -50%) scale(1.05);
        }
        #enter-button:focus {
            outline: 3px solid #ffde37;
            outline-offset: 2px;
        }
        #loading-status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            z-index: 10000;
            display: none;
            font-family: Arial, sans-serif;
        }
        .ui-panel {
            position: fixed;
            background: rgba(26, 26, 26, 0.95);
            border: 3px solid #ffde37;
            border-radius: 10px;
            padding: 15px;
            z-index: 10000;
            color: white;
            max-width: 300px;
            font-family: Arial, sans-serif;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }
        #card-details {
            top: 20px;
            right: 20px;
            display: none;
            pointer-events: none;
        }
        .error-message {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #ff3e41;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 5px;
            z-index: 10001;
            display: none;
            max-width: 300px;
            font-family: Arial, sans-serif;
        }
        /* Accessibility - keyboard focus styles */
        *:focus-visible {
            outline: 3px solid #ffde37;
            outline-offset: 2px;
        }
        /* Mobile optimization */
        @media (max-width: 768px) {
            #enter-button {
                font-size: 1.8rem;
                padding: 15px 30px;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
</head>
<body>
    <button id="enter-button" aria-label="Enter VR Gallery">ENTER VR GALLERY</button>
    <div id="loading-status">Loading assets... <span id="loading-progress">0%</span></div>
    <div id="error-message" class="error-message"></div>
    
    <div id="card-details" class="ui-panel" role="complementary" aria-live="polite">
        <h2 style="color:#ffde37;margin-bottom:10px;">CARD DETAILS</h2>
        <p><strong>Title:</strong> <span id="card-title"></span></p>
        <p><strong>Series:</strong> <span id="card-series"></span></p>
        <p><strong>Value:</strong> $<span id="card-value"></span></p>
    </div>

    <a-scene 
        vr-mode-ui="enabled: true" 
        loading-screen="enabled: true; dotsColor: #ffde37; backgroundColor: #1a1a1a"
        renderer="colorManagement: true; antialias: true"
        device-orientation-permission-ui="enabled: true">
        
        <!-- Environment -->
        <a-entity environment="preset: starry; groundColor: #1a1a1a; grid: none"></a-entity>
        
        <!-- Camera Rig with proper movement controls -->
        <a-entity id="rig" movement-controls="speed: 0.5; controls: keyboard, touch">
            <a-entity camera look-controls="pointerLockEnabled: true" position="0 1.6 0">
                <a-entity cursor="fuse: true; fuseTimeout: 500" 
                          position="0 0 -1"
                          geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                          material="color: #ffde37; shader: flat"
                          raycaster="objects: .clickable; far: 20"
                          event-set__mouseenter="_event: mouseenter; material.color: #ff3e41; scale: 1.2 1.2 1.2"
                          event-set__mouseleave="_event: mouseleave; material.color: #ffde37; scale: 1 1 1">
                </a-entity>
            </a-entity>
        </a-entity>

        <!-- Floating Cards on Walls -->
        <!-- north -->
        <a-entity id="north-wall" position="0 1.5 -4" rotation="0 0 0">
            <a-entity class="card clickable" position="-2 1.5 0" rotation="0 0 0" data-card="1">
                <a-image src="#card1" width="0.8" height="1.1"></a-image>
            </a-entity>
            <a-entity class="card clickable" position="0 1.5 0" rotation="0 0 0" data-card="2">
                <a-image src="#card2" width="0.8" height="1.1"></a-image>
            </a-entity>
            <a-entity class="card clickable" position="2 1.5 0" rotation="0 0 0" data-card="3">
                <a-image src="#card3" width="0.8" height="1.1"></a-image>
            </a-entity>
        </a-entity>

        <!-- east -->
        <a-entity id="east-wall" position="4 1.5 0" rotation="0 -90 0">
            <a-entity class="card clickable" position="0 1.5 -2" rotation="0 0 0" data-card="4">
                <a-image src="#card4" width="0.8" height="1.1"></a-image>
            </a-entity>
            <a-entity class="card clickable" position="0 1.5 0" rotation="0 0 0" data-card="5">
                <a-image src="#card5" width="0.8" height="1.1"></a-image>
            </a-entity>
            <a-entity class="card clickable" position="0 1.5 2" rotation="0 0 0" data-card="6">
                <a-image src="#card6" width="0.8" height="1.1"></a-image>
            </a-entity>
        </a-entity>

        <!-- south -->
        <a-entity id="south-wall" position="0 1.5 4" rotation="0 180 0">
            <a-entity class="card clickable" position="-2 1.5 0" rotation="0 0 0" data-card="7">
                <a-image src="#card7" width="0.8" height="1.1"></a-image>
            </a-entity>
            <a-entity class="card clickable" position="0 1.5 0" rotation="0 0 0" data-card="8">
                <a-image src="#card8" width="0.8" height="1.1"></a-image>
            </a-entity>
            <a-entity class="card clickable" position="2 1.5 0" rotation="0 0 0" data-card="9">
                <a-image src="#card9" width="0.8" height="1.1"></a-image>
            </a-entity>
        </a-entity>

        <!-- west -->
        <a-entity id="west-wall" position="-4 1.5 0" rotation="0 90 0">
            <a-entity class="card clickable" position="0 1.5 -2" rotation="0 0 0" data-card="10">
                <a-image src="#card10" width="0.8" height="1.1"></a-image>
            </a-entity>
            <a-entity class="card clickable" position="0 1.5 0" rotation="0 0 0" data-card="11">
                <a-image src="#card11" width="0.8" height="1.1"></a-image>
            </a-entity>
            <a-entity class="card clickable" position="0 1.5 2" rotation="0 0 0" data-card="12">
                <a-image src="#card12" width="0.8" height="1.1"></a-image>
            </a-entity>
        </a-entity>
        
        <!-- Centerpiece -->
        <a-entity position="0 1.5 0" animation__rotation="property: rotation; to: 0 360 0; loop: true; dur: 60000; easing: linear">
            <a-image src="#featured-card" width="1.5" height="2.1" position="0 1.5 -0.5"></a-image>
        </a-entity>
        
        <!-- 3D Character - Optional, will gracefully fail if model unavailable -->
        <a-entity 
            id="futuristic-character"
            gltf-model="#futuristic-model"
            position="1 0 -3"
            scale="2 2 2"
            rotation="0 180 0"
            class="clickable"
            animation-mixer
            fallback-component="fallback-model">
        </a-entity>

        <!-- Fallback for 3D model -->
        <a-entity id="fallback-model" position="1 0 -3" scale="2 2 2" rotation="0 180 0" class="clickable" visible="false">
            <a-box color="#ff3e41" width="0.8" height="1.6" depth="0.4"></a-box>
            <a-sphere color="#ffde37" radius="0.3" position="0 1 0"></a-sphere>
            <a-text value="GPK" align="center" position="0 1.2 0.21" color="#1a1a1a" width="1"></a-text>
        </a-entity>

        <!-- Assets -->
        <a-assets timeout="10000">
            <!-- Card Images -->
            <img id="card1" src="PompaPaulie.png" crossorigin="anonymous">
            <img id="card2" src="20250503011555.png" crossorigin="anonymous">
            <img id="card3" src="20250503034156.png" crossorigin="anonymous">
            <img id="card4" src="20250503012558.png" crossorigin="anonymous">
            <img id="card5" src="20250503022823.png" crossorigin="anonymous">
            <img id="card6" src="20250503032454.png" crossorigin="anonymous">
            <img id="card7" src="20250503035601.png" crossorigin="anonymous">
            <img id="card8" src="20250503214217.png" crossorigin="anonymous">
            <img id="card9" src="20250503212559.png" crossorigin="anonymous">
            <img id="card10" src="20250507032544.png" crossorigin="anonymous">
            <img id="card11" src="https://placehold.co/400x550/ff3e41/ffde37?text=Coming+Soon" crossorigin="anonymous">
            <img id="card12" src="https://placehold.co/400x550/ff3e41/ffde37?text=Coming+Soon" crossorigin="anonymous">
            <img id="featured-card" src="PompaPaulie.png" crossorigin="anonymous">
            
            <!-- 3D Model - Using a reliable CDN with fallback -->
            <a-asset-item id="futuristic-model" 
                          src="https://raw.githubusercontent.com/aframevr/sample-assets/master/assets/models/character.glb"
                          response-type="arraybuffer">
            </a-asset-item>
        </a-assets>
    </a-scene>

    <script>
        (function() {
            'use strict';
            
            // Updated card data with unique titles (customize these)
            const cardData = {
                "1": { title: "Pompa Paulie", series: "GPK Ultra 3D", value: 150.00 },
                "2": { title: "Atomic Adam", series: "GPK Ultra 3D", value: 125.00 },
                "3": { title: "Bionic Betty", series: "GPK Ultra 3D", value: 200.00 },
                "4": { title: "Cosmic Carl", series: "GPK Ultra 3D", value: 175.00 },
                "5": { title: "Digital Dave", series: "GPK Ultra 3D", value: 225.00 },
                "6": { title: "Electric Eve", series: "GPK Ultra 3D", value: 250.00 },
                "7": { title: "Fusion Frank", series: "GPK Ultra 3D", value: 200.00 },
                "8": { title: "Gamma Gary", series: "GPK Ultra 3D", value: 275.00 },
                "9": { title: "Hologram Helen", series: "GPK Ultra 3D", value: 300.00 },
                "10": { title: "Ion Ivan", series: "GPK Ultra 3D", value: 325.00 },
                "11": { title: "Jupiter Jane", series: "GPK Ultra 3D", value: 250.00 },
                "12": { title: "Kinetic Kyle", series: "GPK Ultra 3D", value: 225.00 },
            };
            
            let sceneLoaded = false;
            let assetsLoaded = 0;
            let totalAssets = 0;
            const enterButton = document.getElementById('enter-button');
            const loadingStatus = document.getElementById('loading-status');
            const loadingProgress = document.getElementById('loading-progress');
            const errorMessage = document.getElementById('error-message');
            const scene = document.querySelector('a-scene');
            
            // Error handling for image loading
            function handleImageError(imgElement) {
                console.warn(`Failed to load image: ${imgElement.src}`);
                // Use placeholder for failed images
                imgElement.src = `https://placehold.co/400x550/666/fff?text=${encodeURIComponent(imgElement.id || 'Error')}`;
                showError(`Some images failed to load. Using placeholders.`);
            }
            
            // Track asset loading
            function setupAssetTracking() {
                const assets = document.querySelector('a-assets');
                const images = assets.querySelectorAll('img');
                totalAssets = images.length;
                
                images.forEach(img => {
                    img.addEventListener('load', () => {
                        assetsLoaded++;
                        updateLoadingProgress();
                    });
                    
                    img.addEventListener('error', () => {
                        assetsLoaded++;
                        handleImageError(img);
                        updateLoadingProgress();
                    });
                });
                
                // Track 3D model loading
                const model = document.getElementById('futuristic-model');
                if (model) {
                    totalAssets++;
                    model.addEventListener('loaded', () => {
                        assetsLoaded++;
                        updateLoadingProgress();
                    });
                    
                    model.addEventListener('error', () => {
                        console.warn('3D model failed to load, using fallback');
                        assetsLoaded++;
                        updateLoadingProgress();
                        // Show fallback model
                        const fallback = document.getElementById('fallback-model');
                        const character = document.getElementById('futuristic-character');
                        if (fallback && character) {
                            character.setAttribute('visible', 'false');
                            fallback.setAttribute('visible', 'true');
                        }
                    });
                }
            }
            
            function updateLoadingProgress() {
                const progress = Math.round((assetsLoaded / totalAssets) * 100);
                loadingProgress.textContent = `${progress}%`;
                
                if (assetsLoaded === totalAssets) {
                    loadingStatus.style.display = 'none';
                }
            }
            
            function showError(message) {
                errorMessage.textContent = message;
                errorMessage.style.display = 'block';
                setTimeout(() => {
                    errorMessage.style.display = 'none';
                }, 5000);
            }
            
            // Setup card interactions
            function setupCardInteractions() {
                if (!sceneLoaded) {
                    console.warn('Scene not fully loaded yet');
                    return;
                }
                
                document.querySelectorAll('.card').forEach(card => {
                    // Remove existing listeners to prevent duplicates
                    card.removeEventListener('click', handleCardClick);
                    card.addEventListener('click', handleCardClick);
                });
                
                // Setup 3D character interaction
                const character = document.getElementById('futuristic-character');
                const fallback = document.getElementById('fallback-model');
                
                [character, fallback].forEach(el => {
                    if (el) {
                        el.removeEventListener('click', handleCharacterClick);
                        el.addEventListener('click', handleCharacterClick);
                    }
                });
            }
            
            function handleCardClick(event) {
                const card = event.currentTarget;
                const cardId = card.getAttribute('data-card');
                showCardDetails(cardId);
                
                // Proper A-Frame animation format
                card.setAttribute('animation__scale', {
                    property: 'scale',
                    to: '1.1 1.1 1.1',
                    dur: 300,
                    easing: 'easeInOutQuad',
                    dir: 'alternate'
                });
            }
            
            function handleCharacterClick(event) {
                const character = event.currentTarget;
                const currentRotation = character.getAttribute('rotation') || { x: 0, y: 180, z: 0 };
                
                character.setAttribute('animation__spin', {
                    property: 'rotation',
                    to: `0 ${currentRotation.y + 360} 0`,
                    dur: 2000,
                    easing: 'easeInOutQuad'
                });
            }
            
            function showCardDetails(cardId) {
                const card = cardData[cardId];
                if (!card) {
                    console.warn(`Card ${cardId} not found`);
                    return;
                }
                
                document.getElementById('card-title').textContent = card.title;
                document.getElementById('card-series').textContent = card.series;
                document.getElementById('card-value').textContent = card.value.toFixed(2);
                
                const detailsPanel = document.getElementById('card-details');
                detailsPanel.style.display = 'block';
                
                // Clear any existing timeout
                if (window.detailsTimeout) {
                    clearTimeout(window.detailsTimeout);
                }
                
                window.detailsTimeout = setTimeout(() => {
                    detailsPanel.style.display = 'none';
                }, 5000);
            }
            
            // Initialize everything
            function initialize() {
                enterButton.addEventListener('click', () => {
                    enterButton.style.display = 'none';
                    loadingStatus.style.display = 'block';
                    
                    // Start asset tracking
                    setupAssetTracking();
                    
                    // Enter VR mode if on mobile
                    if (scene && scene.renderer && /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)) {
                        setTimeout(() => {
                            scene.enterVR();
                        }, 1000);
                    }
                });
                
                // Keyboard accessibility
                enterButton.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        enterButton.click();
                    }
                });
                
                // Wait for scene to fully load
                scene.addEventListener('loaded', () => {
                    sceneLoaded = true;
                    console.log('Scene loaded successfully');
                    setupCardInteractions();
                });
                
                // Handle scene load errors
                scene.addEventListener('error', (e) => {
                    console.error('Scene error:', e);
                    showError('Scene failed to load properly. Please refresh.');
                });
                
                // Setup interactions after scene loads
                scene.addEventListener('renderstart', () => {
                    console.log('Rendering started');
                    if (!sceneLoaded) {
                        sceneLoaded = true;
                        setupCardInteractions();
                    }
                });
            }
            
            // Start initialization when DOM is ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initialize);
            } else {
                initialize();
            }
            
            // Mobile VR optimizations
            if (/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)) {
                // Add mobile-specific optimizations
                const style = document.createElement('style');
                style.textContent = `
                    .a-enter-vr-button {
                        display: none !important;
                    }
                `;
                document.head.appendChild(style);
            }
            
        })();
    </script>
</body>
</html>
