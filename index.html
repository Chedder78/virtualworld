<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GPK ULTRA 3D | Immersive Collector's Hub</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Bangers', cursive;
            background-color: #1a1a1a;
        }
        #enter-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            background: #ff3e41;
            color: #ffde37;
            border: 5px solid #1a1a1a;
            font-size: 2.5rem;
            cursor: pointer;
            z-index: 10000;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            font-family: 'Bangers', cursive;
            transition: transform 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #enter-button:hover {
            transform: translate(-50%, -50%) scale(1.05);
            background: #ff6b6e;
        }
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: #ffde37;
            font-family: 'Bangers', cursive;
        }
        #loading-screen.hidden {
            display: none;
        }
        .progress-bar {
            width: 300px;
            height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin: 20px;
            overflow: hidden;
            border: 2px solid #ffde37;
        }
        .progress-fill {
            height: 100%;
            background: #ff3e41;
            width: 0%;
            transition: width 0.3s;
        }
        .ui-panel {
            position: fixed;
            background: rgba(26, 26, 26, 0.95);
            border: 3px solid #ffde37;
            border-radius: 10px;
            padding: 15px;
            z-index: 10000;
            color: white;
            max-width: 300px;
            font-family: Arial, sans-serif;
            backdrop-filter: blur(5px);
            pointer-events: none;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #card-details {
            top: 20px;
            right: 20px;
            display: none;
        }
        #vr-button {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: #ff3e41;
            color: #ffde37;
            border: 2px solid #ffde37;
            border-radius: 5px;
            cursor: pointer;
            z-index: 10000;
            font-family: 'Bangers', cursive;
            font-size: 1.2rem;
        }
        #vr-button:hover {
            background: #ff6b6e;
        }
        @media (max-width: 768px) {
            #enter-button {
                font-size: 1.8rem;
                padding: 15px 30px;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loading-screen">
        <h1 style="font-size: 3rem; margin-bottom: 20px;">GPK ULTRA 3D</h1>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div id="loading-text">Loading Gallery...</div>
    </div>
    
    <button id="enter-button">ENTER VR GALLERY</button>
    <button id="vr-button" style="display: none;">ENTER VR MODE</button>
    
    <div id="card-details" class="ui-panel">
        <h2 style="color:#ffde37;margin-bottom:10px;">CARD DETAILS</h2>
        <p><strong>Title:</strong> <span id="card-title"></span></p>
        <p><strong>Series:</strong> <span id="card-series"></span></p>
        <p><strong>Value:</strong> $<span id="card-value"></span></p>
    </div>

    <!-- Include Three.js and required libraries -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="MapSystem.js"></script>
    <script src="components/xr-ui.js"></script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { VRButton } from 'three/addons/webxr/VRButton.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // Initialize scene, camera, renderer
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 5);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // CSS2 Renderer for labels
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // Add VR button
        const vrButton = VRButton.createButton(renderer);
        vrButton.style.position = 'absolute';
        vrButton.style.bottom = '20px';
        vrButton.style.left = '20px';
        vrButton.style.zIndex = '10000';
        document.body.appendChild(vrButton);
        
        // Controls for non-VR mode
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;
        controls.enableZoom = true;
        controls.target.set(0, 1.5, 0);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffde37, 1);
        directionalLight.position.set(2, 5, 3);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 1024;
        directionalLight.shadow.mapSize.height = 1024;
        scene.add(directionalLight);
        
        const fillLight = new THREE.PointLight(0x4466ff, 0.5);
        fillLight.position.set(-2, 3, 2);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0xff3e41, 0.3);
        backLight.position.set(0, 2, -5);
        scene.add(backLight);
        
        // Add stars background
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 3000;
        const starPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i += 3) {
            starPositions[i] = (Math.random() - 0.5) * 200;
            starPositions[i+1] = (Math.random() - 0.5) * 200;
            starPositions[i+2] = (Math.random() - 0.5) * 200;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({color: 0xffffff, size: 0.1});
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);
        
        // Floor
        const floorGeometry = new THREE.CircleGeometry(10, 32);
        const floorMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x1a1a1a, 
            roughness: 0.7, 
            metalness: 0.1,
            side: THREE.DoubleSide
        });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = 0;
        floor.receiveShadow = true;
        scene.add(floor);
        
        // Grid helper
        const gridHelper = new THREE.GridHelper(20, 20, 0xffde37, 0x444444);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);
        
        // Card data
        const cardData = {
            "1": { title: "Pompa Paulie", series: "GPK Ultra 3D", value: 150.00 },
            "2": { title: "Atomic Adam", series: "GPK Ultra 3D", value: 125.00 },
            "3": { title: "Bionic Betty", series: "GPK Ultra 3D", value: 200.00 },
            "4": { title: "Cosmic Carl", series: "GPK Ultra 3D", value: 175.00 },
            "5": { title: "Digital Dave", series: "GPK Ultra 3D", value: 225.00 },
            "6": { title: "Electric Eve", series: "GPK Ultra 3D", value: 250.00 },
            "7": { title: "Fusion Frank", series: "GPK Ultra 3D", value: 200.00 },
            "8": { title: "Gamma Gary", series: "GPK Ultra 3D", value: 275.00 },
            "9": { title: "Hologram Helen", series: "GPK Ultra 3D", value: 300.00 },
            "10": { title: "Ion Ivan", series: "GPK Ultra 3D", value: 325.00 },
            "11": { title: "Jupiter Jane", series: "GPK Ultra 3D", value: 250.00 },
            "12": { title: "Kinetic Kyle", series: "GPK Ultra 3D", value: 225.00 },
        };
        
        // Loading manager
        const loadingManager = new THREE.LoadingManager();
        const progressFill = document.getElementById('progress-fill');
        const loadingText = document.getElementById('loading-text');
        const loadingScreen = document.getElementById('loading-screen');
        
        loadingManager.onProgress = (url, itemsLoaded, itemsTotal) => {
            const progress = (itemsLoaded / itemsTotal) * 100;
            progressFill.style.width = progress + '%';
            loadingText.textContent = `Loading: ${Math.round(progress)}%`;
        };
        
        loadingManager.onLoad = () => {
            loadingScreen.classList.add('hidden');
            document.getElementById('enter-button').style.display = 'block';
        };
        
        // Texture loader
        const textureLoader = new THREE.TextureLoader(loadingManager);
        
        // Card image sources
        const cardImages = [
            'PompaPaulie.png',
            '20250503011555.png',
            '20250503034156.png',
            '20250503012558.png',
            '20250503022823.png',
            '20250503032454.png',
            '20250503035601.png',
            '20250503214217.png',
            '20250503212559.png',
            '20250507032544.png',
            null, // placeholder for card 11
            null  // placeholder for card 12
        ];
        
        // Create walls with cards
        function createWallWithCards(position, rotation, startIndex) {
            const wallGroup = new THREE.Group();
            
            // Wall background
            const wallGeometry = new THREE.BoxGeometry(5, 4, 0.1);
            const wallMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x2a2a2a, 
                roughness: 0.5, 
                metalness: 0.1 
            });
            const wall = new THREE.Mesh(wallGeometry, wallMaterial);
            wall.receiveShadow = true;
            wall.castShadow = true;
            wallGroup.add(wall);
            
            // Frame material
            const frameMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xffde37, 
                roughness: 0.3, 
                metalness: 0.7,
                emissive: new THREE.Color(0x332200)
            });
            
            // Add 3 cards per wall
            const positions = [-2, 0, 2];
            positions.forEach((xOffset, index) => {
                const cardIndex = startIndex + index;
                
                // Frame
                const frameGeometry = new THREE.BoxGeometry(0.9, 1.2, 0.05);
                const frame = new THREE.Mesh(frameGeometry, frameMaterial);
                frame.position.set(xOffset, 0.5, 0.06);
                frame.castShadow = true;
                frame.receiveShadow = true;
                wallGroup.add(frame);
                
                // Card image
                const cardMaterial = new THREE.MeshStandardMaterial({
                    roughness: 0.4,
                    metalness: 0.1
                });
                
                if (cardImages[cardIndex]) {
                    const texture = textureLoader.load(cardImages[cardIndex]);
                    cardMaterial.map = texture;
                } else {
                    // Create placeholder texture
                    const canvas = document.createElement('canvas');
                    canvas.width = 512;
                    canvas.height = 712;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#ff3e41';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.font = 'bold 40px Arial';
                    ctx.fillStyle = '#ffde37';
                    ctx.textAlign = 'center';
                    ctx.fillText(`Card ${cardIndex + 1}`, canvas.width/2, canvas.height/2);
                    cardMaterial.map = new THREE.CanvasTexture(canvas);
                }
                
                const cardGeometry = new THREE.BoxGeometry(0.8, 1.1, 0.01);
                const card = new THREE.Mesh(cardGeometry, cardMaterial);
                card.position.set(xOffset, 0.5, 0.09);
                card.castShadow = true;
                card.receiveShadow = true;
                card.userData = { 
                    type: 'card', 
                    cardId: (cardIndex + 1).toString(),
                    data: cardData[(cardIndex + 1).toString()]
                };
                wallGroup.add(card);
                
                // Add label
                const labelDiv = document.createElement('div');
                labelDiv.textContent = cardData[(cardIndex + 1).toString()]?.title || `Card ${cardIndex + 1}`;
                labelDiv.style.color = '#ffde37';
                labelDiv.style.fontSize = '12px';
                labelDiv.style.fontWeight = 'bold';
                labelDiv.style.textShadow = '1px 1px 2px black';
                labelDiv.style.background = 'rgba(0,0,0,0.7)';
                labelDiv.style.padding = '4px 8px';
                labelDiv.style.borderRadius = '4px';
                labelDiv.style.pointerEvents = 'none';
                
                const label = new CSS2DObject(labelDiv);
                label.position.set(xOffset, -0.3, 0.1);
                wallGroup.add(label);
            });
            
            wallGroup.position.set(position.x, position.y, position.z);
            wallGroup.rotation.y = rotation;
            
            return wallGroup;
        }
        
        // Create walls
        scene.add(createWallWithCards(new THREE.Vector3(0, 1.5, -4.5), 0, 0)); // North
        scene.add(createWallWithCards(new THREE.Vector3(4.5, 1.5, 0), Math.PI / 2, 3)); // East
        scene.add(createWallWithCards(new THREE.Vector3(0, 1.5, 4.5), Math.PI, 6)); // South
        scene.add(createWallWithCards(new THREE.Vector3(-4.5, 1.5, 0), -Math.PI / 2, 9)); // West
        
        // Centerpiece - Featured card
        const featuredCardGroup = new THREE.Group();
        featuredCardGroup.position.set(0, 1.5, 0);
        
        const pedestalGeometry = new THREE.CylinderGeometry(0.8, 1, 0.3, 8);
        const pedestalMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xffde37, 
            roughness: 0.3, 
            metalness: 0.7 
        });
        const pedestal = new THREE.Mesh(pedestalGeometry, pedestalMaterial);
        pedestal.position.y = 0.15;
        pedestal.castShadow = true;
        pedestal.receiveShadow = true;
        featuredCardGroup.add(pedestal);
        
        const featuredTexture = textureLoader.load('PompaPaulie.png');
        const featuredMaterial = new THREE.MeshStandardMaterial({ map: featuredTexture });
        const featuredGeometry = new THREE.BoxGeometry(1.5, 2.1, 0.05);
        const featuredCard = new THREE.Mesh(featuredGeometry, featuredMaterial);
        featuredCard.position.set(0, 1.4, 0.5);
        featuredCard.castShadow = true;
        featuredCard.receiveShadow = true;
        featuredCardGroup.add(featuredCard);
        
        scene.add(featuredCardGroup);
        
        // Add rotating animation to featured card
        function animateFeaturedCard() {
            featuredCardGroup.rotation.y += 0.001;
        }
        
        // Add 3D Character (simplified)
        const characterGroup = new THREE.Group();
        characterGroup.position.set(1.5, 0, -2);
        
        // Body
        const bodyGeo = new THREE.CylinderGeometry(0.4, 0.4, 1.2);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff3e41 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0.6;
        body.castShadow = true;
        body.receiveShadow = true;
        characterGroup.add(body);
        
        // Head
        const headGeo = new THREE.SphereGeometry(0.3);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffde37 });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 1.3;
        head.castShadow = true;
        head.receiveShadow = true;
        characterGroup.add(head);
        
        // Eyes
        const eyeGeo = new THREE.SphereGeometry(0.08);
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
        const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
        leftEye.position.set(-0.15, 1.35, 0.25);
        characterGroup.add(leftEye);
        
        const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
        rightEye.position.set(0.15, 1.35, 0.25);
        characterGroup.add(rightEye);
        
        characterGroup.userData = { type: 'character' };
        scene.add(characterGroup);
        
        // Raycaster for interaction
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        renderer.domElement.addEventListener('click', (event) => {
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObjects(scene.children, true);
            
            if (intersects.length > 0) {
                const hit = intersects[0].object;
                
                if (hit.userData.type === 'card') {
                    showCardDetails(hit.userData.cardId);
                    
                    // Animate card
                    gsap.to(hit.scale, {
                        x: 1.1, y: 1.1, z: 1.1,
                        duration: 0.3,
                        yoyo: true,
                        repeat: 1
                    });
                } else if (hit.userData.type === 'character' || hit.parent?.userData?.type === 'character') {
                    // Animate character
                    gsap.to(characterGroup.rotation, {
                        y: characterGroup.rotation.y + Math.PI * 2,
                        duration: 2,
                        ease: "power2.inOut"
                    });
                }
            }
        });
        
        function showCardDetails(cardId) {
            const card = cardData[cardId];
            if (!card) return;
            
            document.getElementById('card-title').textContent = card.title;
            document.getElementById('card-series').textContent = card.series;
            document.getElementById('card-value').textContent = card.value.toFixed(2);
            
            const detailsPanel = document.getElementById('card-details');
            detailsPanel.style.display = 'block';
            
            if (window.detailsTimeout) {
                clearTimeout(window.detailsTimeout);
            }
            
            window.detailsTimeout = setTimeout(() => {
                detailsPanel.style.display = 'none';
            }, 5000);
        }
        
        // Initialize MapSystem
        let mapSystem;
        
        function initMapSystem() {
            mapSystem = new MapSystem({
                scene: scene,
                camera: camera,
                renderer: renderer
            });
            
            // Set POIs
            const pois = [
                { name: 'Featured Card', position: [0, 1.5, 0], description: 'Center display' },
                { name: 'North Gallery', position: [0, 1.5, -4], description: 'North wall collection' },
                { name: 'East Gallery', position: [4, 1.5, 0], description: 'East wall collection' },
                { name: 'South Gallery', position: [0, 1.5, 4], description: 'South wall collection' },
                { name: 'West Gallery', position: [-4, 1.5, 0], description: 'West wall collection' },
                { name: 'GPK Character', position: [1.5, 1, -2], description: 'Interactive character' }
            ];
            
            mapSystem.setPOIs(pois);
        }
        
        // Enter button handler
        document.getElementById('enter-button').addEventListener('click', () => {
            document.getElementById('enter-button').style.display = 'none';
            controls.autoRotate = false;
            
            // Initialize MapSystem after user interaction
            if (!mapSystem) {
                initMapSystem();
            }
            
            // Add XR UI
            const xrUI = document.createElement('xr-ui');
            document.body.appendChild(xrUI);
        });
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            controls.update();
            animateFeaturedCard();
            
            // Rotate stars slowly
            stars.rotation.y += 0.0001;
            
            // Update MapSystem
            if (mapSystem && mapSystem.update) {
                mapSystem.update(0.016);
            }
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();
        
        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Keyboard controls
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (controls.autoRotate) {
                    controls.autoRotate = false;
                }
            }
        });
        
        console.log('GPK Ultra 3D Gallery initialized!');
    </script>
</body>
</html>
